<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      @import url("./styles.css");

      .description-text {
        font-size: 13px;
        color: var(--color-text-secondary);
        margin: 0 0 12px;
      }
      .act-btn {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        width: 100%;
        padding: 10px 14px;
        border: 0.5px solid var(--color-border-tertiary);
        border-radius: var(--border-radius-md);
        background: var(--color-background-primary);
        color: var(--color-text-primary);
        cursor: pointer;
        font-size: 13px;
        text-align: left;
        transition: background 0.15s, border-color 0.15s;
        margin-bottom: 8px;
      }
      .act-btn:hover {
        background: var(--color-background-secondary);
        border-color: var(--color-border-secondary);
      }
      .act-num {
        min-width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--color-background-secondary);
        border: 0.5px solid var(--color-border-tertiary);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 500;
        color: var(--color-text-secondary);
        margin-top: 1px;
      }
      .free-area {
        margin-top: 0.5rem;
      }
      .free-input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 12px;
        font-size: 13px;
        border: 0.5px solid var(--color-border-tertiary);
        border-radius: var(--border-radius-md);
        background: var(--color-background-primary);
        color: var(--color-text-primary);
      }
      .free-input:focus {
        outline: none;
        border-color: var(--color-border-secondary);
      }
      .send-btn {
        margin-top: 8px;
        padding: 6px 16px;
        font-size: 13px;
        border: 0.5px solid var(--color-border-secondary);
        border-radius: var(--border-radius-md);
        background: transparent;
        color: var(--color-text-primary);
        cursor: pointer;
        transition: background 0.15s;
      }
      .send-btn:hover {
        background: var(--color-background-secondary);
      }
    </style>
  </head>

  <body>
    <p id="scene-description" class="description-text">
      描述當前行動前情境，請玩家選擇行動
    </p>
    <button class="act-btn" onclick="sendPrompt(optionOnePrompt)">
      <span class="act-num">1</span>
      <span>選項描述 ↗</span>
    </button>

    <button class="act-btn" onclick="sendPrompt(optionTwoPrompt)">
      <span class="act-num">2</span>
      <span>選項描述 ↗</span>
    </button>

    <button class="act-btn" onclick="sendPrompt(optionThreePrompt)">
      <span class="act-num">3</span>
      <span>選項描述 ↗</span>
    </button>

    <button class="act-btn" onclick="sendPrompt(optionFourPrompt)">
      <span class="act-num">4</span>
      <span>選項描述 ↗</span>
    </button>

    <div class="free-area">
      <div
        style="
          font-size: 11px;
          color: var(--color-text-secondary);
          margin-bottom: 6px;
        "
      >
        ✦ 自由行動
      </div>
      <input
        class="free-input"
        id="free-input"
        type="text"
        placeholder="輸入你想做的事……"
      />
      <br />
      <button
        class="send-btn"
        onclick="(function(){var v=document.getElementById('free-input').value.trim();if(v)sendPrompt(v)})()"
      >
        送出 ↗
      </button>
    </div>
  </body>
</html>
